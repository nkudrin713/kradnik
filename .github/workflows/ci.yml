name: CI

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read

jobs:
  checks:
    name: Tests and checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run tests and checks
        run: ./gradlew check
