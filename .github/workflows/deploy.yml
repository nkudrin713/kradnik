name: Deploy

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - development
          - production

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.event_name == 'workflow_dispatch' && inputs.environment || github.ref_name }}
  cancel-in-progress: false

jobs:
  checks:
    name: Tests and checks
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref_name == 'main' && 'production' || 'development') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run tests and build jar
        run: ./gradlew check bootJar

      - name: Prepare Docker context
        run: |
          set -euo pipefail
          mkdir -p .deploy
          cp build/libs/app.jar .deploy/app.jar

      - name: Set image name
        run: |
          set -euo pipefail
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:${{ github.event_name == 'workflow_dispatch' && inputs.environment || github.ref_name }}

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: checks
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref_name == 'main' && 'production' || 'development') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check latest commit before deploy
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: |
          set -euo pipefail
          latest_sha="$(git ls-remote origin "refs/heads/$GITHUB_REF_NAME" | cut -f1)"
          echo "Current SHA: $GITHUB_SHA"
          echo "Latest $GITHUB_REF_NAME SHA: $latest_sha"
          test "$latest_sha" = "$GITHUB_SHA"

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync compose file
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_PATH"
          test "$DEPLOY_PATH" != "/"
          tar -czf - docker-compose.yml \
            | ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH' && tar -xzf - -C '$DEPLOY_PATH'"

      - name: Write environment
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_DONATION_URL: ${{ vars.TELEGRAM_DONATION_URL || secrets.TELEGRAM_DONATION_URL }}
          TELEGRAM_DONATION_CHANNEL_ID: ${{ vars.TELEGRAM_DONATION_CHANNEL_ID || secrets.TELEGRAM_DONATION_CHANNEL_ID }}
          TELEGRAM_DONATION_PIN_ENABLED: ${{ vars.TELEGRAM_DONATION_PIN_ENABLED || secrets.TELEGRAM_DONATION_PIN_ENABLED }}
          TELEGRAM_DONATION_PIN_MESSAGE_ID: ${{ vars.TELEGRAM_DONATION_PIN_MESSAGE_ID || secrets.TELEGRAM_DONATION_PIN_MESSAGE_ID }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_PATH"
          test "$DEPLOY_PATH" != "/"
          app_image="ghcr.io/${GITHUB_REPOSITORY,,}:$GITHUB_SHA"
          deploy_environment="${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref_name == 'main' && 'production' || 'development') }}"
          if [ "$deploy_environment" = "production" ]; then
            app_container_name="kradnik-prod-app"
            postgres_container_name="kradnik-prod-postgres"
            postgres_db="kradnik_prod"
            postgres_volume_name="kradnik-prod-postgres-data"
            postgres_public_port="5434"
          else
            app_container_name="kradnik-test-app"
            postgres_container_name="kradnik-test-postgres"
            postgres_db="kradnik_test"
            postgres_volume_name="kradnik-test-postgres-data"
            postgres_public_port="5433"
          fi
          {
            printf 'APP_IMAGE=%s\n' "$app_image"
            printf 'APP_CONTAINER_NAME=%s\n' "$app_container_name"
            printf 'POSTGRES_CONTAINER_NAME=%s\n' "$postgres_container_name"
            printf 'POSTGRES_DB=%s\n' "$postgres_db"
            printf 'POSTGRES_USER=kradnik\n'
            printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD"
            printf 'POSTGRES_VOLUME_NAME=%s\n' "$postgres_volume_name"
            printf 'POSTGRES_PUBLIC_PORT=%s\n' "$postgres_public_port"
            printf 'TELEGRAM_BOT_TOKEN=%s\n' "$TELEGRAM_BOT_TOKEN"
            printf 'TELEGRAM_DONATION_URL=%s\n' "${TELEGRAM_DONATION_URL:-https://pay.cloudtips.ru/p/6f779a3d}"
            printf 'TELEGRAM_DONATION_CHANNEL_ID=%s\n' "${TELEGRAM_DONATION_CHANNEL_ID:-@mediakradnik}"
            printf 'TELEGRAM_DONATION_PIN_ENABLED=%s\n' "${TELEGRAM_DONATION_PIN_ENABLED:-false}"
            printf 'TELEGRAM_DONATION_PIN_MESSAGE_ID=%s\n' "${TELEGRAM_DONATION_PIN_MESSAGE_ID:-}"
          } | ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "cat > '$DEPLOY_PATH/.env'"

      - name: Check latest commit before restart
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: |
          set -euo pipefail
          latest_sha="$(git ls-remote origin "refs/heads/$GITHUB_REF_NAME" | cut -f1)"
          echo "Current SHA: $GITHUB_SHA"
          echo "Latest $GITHUB_REF_NAME SHA: $latest_sha"
          test "$latest_sha" = "$GITHUB_SHA"

      - name: Login to GHCR on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          printf '%s\n' "$GHCR_TOKEN" \
            | ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "docker login ghcr.io -u '$GHCR_USER' --password-stdin"

      - name: Restart app
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_PATH"
          test "$DEPLOY_PATH" != "/"
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "\
            cd '$DEPLOY_PATH' && \
            docker compose pull app && \
            docker compose up -d --remove-orphans && \
            docker compose ps && \
            test \"\$(docker compose ps -q app | xargs docker inspect -f '{{.State.Status}}')\" = running && \
            docker image prune -f\
          "
