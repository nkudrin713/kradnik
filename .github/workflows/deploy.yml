name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  checks:
    name: Tests and checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run tests and build jar
        run: ./gradlew check bootJar

      - name: Upload app jar
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/app.jar
          if-no-files-found: error

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: checks

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download app jar
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: .deploy

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync sources
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_PATH"
          test "$DEPLOY_PATH" != "/"
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "\
            mkdir -p '$DEPLOY_PATH' && \
            find '$DEPLOY_PATH' -mindepth 1 -maxdepth 1 -exec rm -rf -- {} +\
          "
          tar \
            --exclude='.git' \
            --exclude='.gradle' \
            --exclude='build' \
            -czf - . \
            | ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "tar -xzf - -C '$DEPLOY_PATH'"

      - name: Write environment
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_DONATION_URL: ${{ vars.TELEGRAM_DONATION_URL || secrets.TELEGRAM_DONATION_URL }}
          TELEGRAM_DONATION_CHANNEL_ID: ${{ vars.TELEGRAM_DONATION_CHANNEL_ID || secrets.TELEGRAM_DONATION_CHANNEL_ID }}
          TELEGRAM_DONATION_PIN_ENABLED: ${{ vars.TELEGRAM_DONATION_PIN_ENABLED || secrets.TELEGRAM_DONATION_PIN_ENABLED }}
          TELEGRAM_DONATION_PIN_MESSAGE_ID: ${{ vars.TELEGRAM_DONATION_PIN_MESSAGE_ID || secrets.TELEGRAM_DONATION_PIN_MESSAGE_ID }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_PATH"
          test "$DEPLOY_PATH" != "/"
          {
            printf 'POSTGRES_DB=kradnik\n'
            printf 'POSTGRES_USER=kradnik\n'
            printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD"
            printf 'TELEGRAM_BOT_TOKEN=%s\n' "$TELEGRAM_BOT_TOKEN"
            printf 'TELEGRAM_DONATION_URL=%s\n' "${TELEGRAM_DONATION_URL:-https://pay.cloudtips.ru/p/6f779a3d}"
            printf 'TELEGRAM_DONATION_CHANNEL_ID=%s\n' "${TELEGRAM_DONATION_CHANNEL_ID:-@mediakradnik}"
            printf 'TELEGRAM_DONATION_PIN_ENABLED=%s\n' "${TELEGRAM_DONATION_PIN_ENABLED:-false}"
            printf 'TELEGRAM_DONATION_PIN_MESSAGE_ID=%s\n' "${TELEGRAM_DONATION_PIN_MESSAGE_ID:-}"
          } | ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "cat > '$DEPLOY_PATH/.env'"

      - name: Restart app
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_PATH"
          test "$DEPLOY_PATH" != "/"
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "\
            cd '$DEPLOY_PATH' && \
            docker compose up -d --build --remove-orphans && \
            docker compose ps && \
            test \"\$(docker compose ps -q app | xargs docker inspect -f '{{.State.Status}}')\" = running && \
            docker image prune -f\
          "
