name: Deploy

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - development
          - production

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.event_name == 'workflow_dispatch' && inputs.environment || github.ref_name }}
  cancel-in-progress: true

jobs:
  checks:
    name: Tests and checks
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref_name == 'main' && 'production' || 'development') }}
    outputs:
      deployable: ${{ steps.latest_before_push.outputs.is_latest || steps.latest_before_push_manual.outputs.is_latest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check latest commit before build
        id: latest_before_build
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: |
          set -euo pipefail
          latest_sha="$(git ls-remote origin "refs/heads/$GITHUB_REF_NAME" | cut -f1)"
          echo "Current SHA: $GITHUB_SHA"
          echo "Latest $GITHUB_REF_NAME SHA: $latest_sha"
          if [ "$latest_sha" = "$GITHUB_SHA" ]; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Mark manual deploy as latest
        id: latest_before_build_manual
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: echo "is_latest=true" >> "$GITHUB_OUTPUT"

      - name: Set up JDK
        if: ${{ steps.latest_before_build.outputs.is_latest == 'true' || steps.latest_before_build_manual.outputs.is_latest == 'true' }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        if: ${{ steps.latest_before_build.outputs.is_latest == 'true' || steps.latest_before_build_manual.outputs.is_latest == 'true' }}
        uses: gradle/actions/setup-gradle@v5

      - name: Run tests and build jar
        if: ${{ steps.latest_before_build.outputs.is_latest == 'true' || steps.latest_before_build_manual.outputs.is_latest == 'true' }}
        run: ./gradlew check bootJar

      - name: Prepare Docker context
        if: ${{ steps.latest_before_build.outputs.is_latest == 'true' || steps.latest_before_build_manual.outputs.is_latest == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p .deploy
          cp build/libs/app.jar .deploy/app.jar

      - name: Set image name
        if: ${{ steps.latest_before_build.outputs.is_latest == 'true' || steps.latest_before_build_manual.outputs.is_latest == 'true' }}
        run: |
          set -euo pipefail
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Check latest commit before image push
        id: latest_before_push
        if: ${{ github.event_name != 'workflow_dispatch' && steps.latest_before_build.outputs.is_latest == 'true' }}
        run: |
          set -euo pipefail
          latest_sha="$(git ls-remote origin "refs/heads/$GITHUB_REF_NAME" | cut -f1)"
          echo "Current SHA: $GITHUB_SHA"
          echo "Latest $GITHUB_REF_NAME SHA: $latest_sha"
          if [ "$latest_sha" = "$GITHUB_SHA" ]; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Mark manual image push as latest
        id: latest_before_push_manual
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: echo "is_latest=true" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: ${{ steps.latest_before_push.outputs.is_latest == 'true' || steps.latest_before_push_manual.outputs.is_latest == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        if: ${{ steps.latest_before_push.outputs.is_latest == 'true' || steps.latest_before_push_manual.outputs.is_latest == 'true' }}
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        if: ${{ steps.latest_before_push.outputs.is_latest == 'true' || steps.latest_before_push_manual.outputs.is_latest == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:${{ github.event_name == 'workflow_dispatch' && inputs.environment || github.ref_name }}

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: checks
    if: ${{ needs.checks.outputs.deployable == 'true' }}
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref_name == 'main' && 'production' || 'development') }}
    concurrency:
      group: deploy-server
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check latest commit before deploy
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: |
          set -euo pipefail
          latest_sha="$(git ls-remote origin "refs/heads/$GITHUB_REF_NAME" | cut -f1)"
          echo "Current SHA: $GITHUB_SHA"
          echo "Latest $GITHUB_REF_NAME SHA: $latest_sha"
          test "$latest_sha" = "$GITHUB_SHA"

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync compose file
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_PATH"
          test "$DEPLOY_PATH" != "/"
          tar -czf - docker-compose.yml \
            | ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH' && tar -xzf - -C '$DEPLOY_PATH'"

      - name: Write environment
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_DONATION_URL: ${{ vars.TELEGRAM_DONATION_URL || secrets.TELEGRAM_DONATION_URL }}
          TELEGRAM_DONATION_CHANNEL_ID: ${{ vars.TELEGRAM_DONATION_CHANNEL_ID || secrets.TELEGRAM_DONATION_CHANNEL_ID }}
          TELEGRAM_DONATION_PIN_ENABLED: ${{ vars.TELEGRAM_DONATION_PIN_ENABLED || secrets.TELEGRAM_DONATION_PIN_ENABLED }}
          TELEGRAM_DONATION_PIN_MESSAGE_ID: ${{ vars.TELEGRAM_DONATION_PIN_MESSAGE_ID || secrets.TELEGRAM_DONATION_PIN_MESSAGE_ID }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_PATH"
          test "$DEPLOY_PATH" != "/"
          image_tag="${{ github.event_name == 'workflow_dispatch' && inputs.environment || github.ref_name }}"
          app_image="ghcr.io/${GITHUB_REPOSITORY,,}:$image_tag"
          deploy_environment="${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref_name == 'main' && 'production' || 'development') }}"
          if [ "$deploy_environment" = "production" ]; then
            app_container_name="kradnik-prod-app"
            postgres_container_name="kradnik-prod-postgres"
            postgres_db="kradnik_prod"
            postgres_volume_name="kradnik-prod-postgres-data"
            postgres_public_port="5434"
          else
            app_container_name="kradnik-test-app"
            postgres_container_name="kradnik-test-postgres"
            postgres_db="kradnik_test"
            postgres_volume_name="kradnik-test-postgres-data"
            postgres_public_port="5433"
          fi
          {
            printf 'APP_IMAGE=%s\n' "$app_image"
            printf 'APP_CONTAINER_NAME=%s\n' "$app_container_name"
            printf 'POSTGRES_CONTAINER_NAME=%s\n' "$postgres_container_name"
            printf 'POSTGRES_DB=%s\n' "$postgres_db"
            printf 'POSTGRES_USER=kradnik\n'
            printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD"
            printf 'POSTGRES_VOLUME_NAME=%s\n' "$postgres_volume_name"
            printf 'POSTGRES_PUBLIC_PORT=%s\n' "$postgres_public_port"
            printf 'TELEGRAM_BOT_TOKEN=%s\n' "$TELEGRAM_BOT_TOKEN"
            printf 'TELEGRAM_DONATION_URL=%s\n' "${TELEGRAM_DONATION_URL:-https://pay.cloudtips.ru/p/6f779a3d}"
            printf 'TELEGRAM_DONATION_CHANNEL_ID=%s\n' "${TELEGRAM_DONATION_CHANNEL_ID:-@mediakradnik}"
            printf 'TELEGRAM_DONATION_PIN_ENABLED=%s\n' "${TELEGRAM_DONATION_PIN_ENABLED:-false}"
            printf 'TELEGRAM_DONATION_PIN_MESSAGE_ID=%s\n' "${TELEGRAM_DONATION_PIN_MESSAGE_ID:-}"
          } | ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "cat > '$DEPLOY_PATH/.env.next'"

      - name: Check latest commit before restart
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: |
          set -euo pipefail
          latest_sha="$(git ls-remote origin "refs/heads/$GITHUB_REF_NAME" | cut -f1)"
          echo "Current SHA: $GITHUB_SHA"
          echo "Latest $GITHUB_REF_NAME SHA: $latest_sha"
          test "$latest_sha" = "$GITHUB_SHA"

      - name: Login to GHCR on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_PATH"
          test "$DEPLOY_PATH" != "/"
          printf '%s\n' "$GHCR_TOKEN" \
            | ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "\
              mkdir -p '$DEPLOY_PATH/.docker' && \
              DOCKER_CONFIG='$DEPLOY_PATH/.docker' docker login ghcr.io -u '$GHCR_USER' --password-stdin\
            "

      - name: Restart app
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_PATH"
          test "$DEPLOY_PATH" != "/"
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "\
            set -euo pipefail && \
            cd '$DEPLOY_PATH' && \
            test -f .env.next && \
            if [ -f .env ]; then cp .env .env.previous; else rm -f .env.previous; fi && \
            rollback() { \
              status=\$?; \
              if [ \"\$status\" -ne 0 ] && [ -f .env.previous ]; then \
                mv .env.previous .env; \
                DOCKER_CONFIG='$DEPLOY_PATH/.docker' docker compose up -d --remove-orphans || true; \
              fi; \
              exit \"\$status\"; \
            } && \
            pull_app() { \
              for attempt in 1 2 3; do \
                DOCKER_CONFIG='$DEPLOY_PATH/.docker' docker compose pull app && return 0; \
                sleep \$((attempt * 5)); \
              done; \
              return 1; \
            } && \
            trap rollback EXIT && \
            mv .env.next .env && \
            pull_app && \
            DOCKER_CONFIG='$DEPLOY_PATH/.docker' docker compose up -d --remove-orphans && \
            DOCKER_CONFIG='$DEPLOY_PATH/.docker' docker compose ps && \
            app_container=\$(docker compose ps -q app) && \
            test -n \"\$app_container\" && \
            test \"\$(docker inspect -f '{{.State.Status}}' \"\$app_container\")\" = running && \
            sleep 15 && \
            test \"\$(docker inspect -f '{{.State.Status}}' \"\$app_container\")\" = running && \
            rm -f .env.previous && \
            docker image prune -f --filter until=24h\
          "
