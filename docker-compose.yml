services:
  app:
    build:
      context: .
    container_name: kradnik-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-kradnik}
      POSTGRES_USER: ${POSTGRES_USER:-kradnik}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kradnik}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}

  postgres:
    image: postgres:17-alpine
    container_name: kradnik-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kradnik}
      POSTGRES_USER: ${POSTGRES_USER:-kradnik}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kradnik}
    ports:
      - "${POSTGRES_PUBLIC_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
