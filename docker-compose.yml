services:
  postgres:
    image: postgres:17-alpine
    container_name: kradnik-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kradnik
      POSTGRES_USER: kradnik
      POSTGRES_PASSWORD: kradnik
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kradnik -d kradnik"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
