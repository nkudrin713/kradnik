spring.application.name=kradnik

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:kradnik}
spring.datasource.username=${POSTGRES_USER:kradnik}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true

telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.donation.url=${TELEGRAM_DONATION_URL:https://pay.cloudtips.ru/p/6f779a3d}
telegram.donation.channel-id=${TELEGRAM_DONATION_CHANNEL_ID:@mediakradnik}
telegram.donation.pin.enabled=${TELEGRAM_DONATION_PIN_ENABLED:false}
telegram.donation.pin-message-id=${TELEGRAM_DONATION_PIN_MESSAGE_ID:}

download.platform.youtube.enabled=${DOWNLOAD_PLATFORM_YOUTUBE_ENABLED:false}
download.platform.instagram.enabled=${DOWNLOAD_PLATFORM_INSTAGRAM_ENABLED:false}
