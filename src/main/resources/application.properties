spring.application.name=kradnik

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:kradnik}
spring.datasource.username=${POSTGRES_USER:kradnik}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true

telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.long-polling-timeout-seconds=${TELEGRAM_BOT_LONG_POLLING_TIMEOUT_SECONDS:20}
telegram.bot.connect-timeout-seconds=${TELEGRAM_BOT_CONNECT_TIMEOUT_SECONDS:10}
telegram.bot.read-timeout-seconds=${TELEGRAM_BOT_READ_TIMEOUT_SECONDS:35}
telegram.bot.write-timeout-seconds=${TELEGRAM_BOT_WRITE_TIMEOUT_SECONDS:30}

download.worker.enabled=${DOWNLOAD_WORKER_ENABLED:true}
download.worker.concurrency=${DOWNLOAD_WORKER_CONCURRENCY:2}
download.worker.poll-interval-ms=${DOWNLOAD_WORKER_POLL_INTERVAL_MS:5000}
